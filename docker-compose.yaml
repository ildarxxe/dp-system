services:
  mysql:
    image: mysql:8.0
    container_name: dev_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS}
      MYSQL_DATABASE: ${DB_NAME}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASS}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal_net

  minio:
    image: minio/minio
    container_name: dev_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASS}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal_net

  rabbitmq:
    image: rabbitmq:3-management
    container_name: dev_rabbit
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal_net

  redis:
    image: redis
    container_name: dev_redis
    restart: always
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_USER=${REDIS_USER}
      - REDIS_USER_PASSWORD=${REDIS_USER_PASSWORD}
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "$REDIS_PASSWORD", "ping" ]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - internal_net

  api:
    build:
      context: api
      dockerfile: cmd/api/Dockerfile
    container_name: dev_api
    depends_on:
      mysql: { condition: service_healthy }
      minio: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    env_file: .env
    networks:
      - internal_net

  worker:
    build:
      context: api
      dockerfile: cmd/worker/Dockerfile
    container_name: dev_worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      rabbitmq: { condition: service_healthy }
    env_file: .env
    networks:
      - internal_net

  client:
    build:
      context: client
      dockerfile: Dockerfile
    container_name: dev_client
    depends_on:
      - api
    networks:
      - internal_net

  nginx:
    image: nginx:alpine
    container_name: nginx_dpsystem
    restart: always
    volumes:
      - ./public:/usr/share/nginx/html:ro
    networks:
      - web_network
      - internal_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dpsystem.rule=Host(`dp-system.mirrorise.ru`)"
      - "traefik.http.routers.dpsystem.entrypoints=websecure"
      - "traefik.http.routers.dpsystem.tls.certresolver=myresolver"
      - "traefik.http.services.dpsystem.loadbalancer.server.port=80"
      - "traefik.docker.network=kpvk_web"

networks:

  internal_net:
    driver: bridge

  web_network:
    external: true
    name: kpvk_web